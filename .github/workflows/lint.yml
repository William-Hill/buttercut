name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg luarocks && sudo luarocks install luacheck
      - name: RSpec
        run: bundle exec rspec
      - name: Lint fuses
        run: ruby .claude/scripts/lint_fuses.rb
