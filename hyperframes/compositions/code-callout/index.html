<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"command","type":"string","label":"Command","default":"git status"},
    {"id":"caption","type":"string","label":"Caption","default":""},
    {"id":"duration","type":"number","label":"Duration","default":5},
    {"id":"theme","type":"object","label":"Theme tokens","default":{}}
  ]'
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>code-callout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg: #0d0d0d;
        --fg: #f5f5f4;
        --accent: #ff6b35;
        --muted: #a3a3a3;
        --font-display: 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: var(--bg); color: var(--fg); }
      body { font-family: var(--font-display); }
      .mono { font-family: var(--font-mono); }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="code-callout"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div class="w-full h-full flex items-center justify-center">
        <div id="card" class="clip opacity-0 max-w-[80%]" data-start="0" data-duration="5">
          <div class="rounded-2xl border border-white/10 shadow-2xl bg-black/70 backdrop-blur p-10">
            <div class="text-sm uppercase tracking-widest mono" style="color: var(--accent);">command</div>
            <div id="cmd" class="mono text-5xl mt-3" style="color: var(--fg);">git status</div>
            <div id="cap" class="text-2xl mt-6" style="color: var(--muted);"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      // Hyperframes resolves data-duration at composition compile time, so the
      // encoded length is fixed by the data-duration attribute (5s) regardless
      // of vars.duration. Variable durations require pre-render templating;
      // tracked as a follow-up.
      const vars = (window.__hyperframes && window.__hyperframes.getVariables && window.__hyperframes.getVariables()) || {};
      const duration = 5;

      const theme = vars.theme || {};
      const root = document.documentElement.style;
      if (theme.color_bg) root.setProperty('--bg', theme.color_bg);
      if (theme.color_accent) root.setProperty('--accent', theme.color_accent);
      if (theme.font_display) root.setProperty('--font-display', `'${theme.font_display}', system-ui, sans-serif`);
      if (theme.font_mono) root.setProperty('--font-mono', `'${theme.font_mono}', ui-monospace, monospace`);

      document.getElementById('cmd').textContent = vars.command || 'git status';
      document.getElementById('cap').textContent = vars.caption || '';

      const tl = gsap.timeline({ paused: true });
      tl.fromTo('#card', { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 0);
      tl.to('#card', { opacity: 1, duration: Math.max(0, duration - 1.0) }, 0.5);
      tl.to('#card', { opacity: 0, y: -16, duration: 0.5, ease: 'power2.in' }, Math.max(0.5, duration - 0.5));
      window.__timelines = window.__timelines || {};
      window.__timelines["code-callout"] = tl;
    </script>
  </body>
</html>
